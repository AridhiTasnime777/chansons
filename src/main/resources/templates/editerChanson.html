<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
 xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css"
href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Ajout des Produits</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container mt-5">
<div class="card">
 <div class="card-header">
 Modifier des Chansons
 </div>
 <div class="card-body">
<form th:action="@{saveChanson}" method="post">
<div class="form-group">
<label class="control-label" hidden>ID Chanson :</label>
 <input type="hidden" name="idChanson" class="form-control"
th:value="${chanson.idChanson}" />
</div>
<div class="form-group">
<label class="control-label">titre Chanson :</label>
<input type="text" name="titreChanson" class="form-control"
th:value="${chanson.titreChanson}" />
 <span th:errors= ${chanson.titreChanson} class="text-danger"> </span>
</div>
<div class="form-group">
<label class="control-label">date de realisation :</label>
<input type="date" name="dateCreation" class="form-control"
th:value="${chanson.dateCreation}"/>
<span th:errors=${chanson.dateCreation} class="text-danger"> </span>
</div>
<div>
<button type="submit" class="btn btn-primary">Valider</button>
</div>
</form>
</div>
</div>
</div>
</body>
</html>
