<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">     
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Ajout des Produits</title>
</head>
<body>
   <div th:replace="template"></div>
<div class="container mt-5">
<div class="card">
  <div class="card-header" th:if="${mode=='new'}"> Ajout des chansons </div>
  <div class="card-header" th:if="${mode=='edit'}">Modification des chansons </div>
  	<div class="card-body">
	<form th:action="@{saveChanson}" method="post">
	   
	    <input hidden name="page" class="form-control" th:value="${page}" />
		<input hidden name="size" class="form-control" th:value="${size}" />
	
		<div class="form-group">
			<label class="control-label" hidden>ID Chanson :</label> 
		       <input type="hidden" name="idChanson" class="form-control" th:value="${chanson.id}"  />
		</div>					
		<div class="form-group">
			<label class="control-label">Nom Chanson :</label> 
			 <input type="text" name="nomChanson" class="form-control" th:value="${chanson.titre}"  />
			<span th:errors= ${chanson.nomChanson} class="text-danger"> </span>	 
		</div>
		<div class="form-group">
			<label class="control-label">artist Chanson :</label> 
		    <input type="text" name="artistChanson" class="form-control" th:value="${chanson.artist}" />
		    <span th:errors=${chanson.prixChanson} class="text-danger"> </span> 
		</div>
		<div class="form-group">
			<label class="control-label">date création :</label> 
			<input type="date" name="dateCreation" class="form-control"  th:value="${chanson.releaseDate}"/>
			 <span th:errors=${chanson.dateCreation} class="text-danger"> </span> 
		</div>

					<div class="form-group">
						<label class="control-label">Album :</label> 
						<select 
							name="album" class="form-control"
							th:value="${chanson.album.idalb}"
							th:if="${!#strings.isEmpty(chanson.album)}">
							<option th:each="c:${albums}" th:if="${mode=='edit'}"
								th:value="${c.idalb}" th:text="${c.nomalb}"
								th:selected="${ c.idalb==chanson.album.idalb}">
							</option>
						</select>
						<!-- s'il s'agit d'un ajout (mode==new) ou d'une modification d'un produit ayant une catégorie null -->
						<select name="album" class="form-control"
							th:if="${#strings.isEmpty(chanson.album)}">
							<option th:each="c:${albums}" th:value="${c.idalb}"
								th:text="${c.nomAlb}"></option>
						</select>
					</div>


					<div>
		<button type="submit" class="btn btn-primary">Valider</button>
		</div>
		</form>
		</div>
		</div>
</div>

</body>
</html>
