<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>Ajout des Chansons</title>
<link rel="stylesheet" type="text/css" href="/chansons/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
</head>
<body>
<div th:replace="~{template :: navbar}"></div>

<div class="container mt-5">
  <div class="card">
    <div class="card-header" th:if="${mode=='new'}">Ajout des chansons</div>
    <div class="card-header" th:if="${mode=='edit'}">Modification des chansons</div>
    <div class="card-body">

      <!-- ✅ FIX: action points to saveChanson for new, updateChanson for edit -->
      <form th:action="${mode=='edit'} ? @{/updateChanson} : @{/saveChanson}" method="post">

        <!-- ✅ FIX: field name is 'idChanson' to match entity getter/setter -->
        <input type="hidden" name="idChanson" th:value="${chanson.idChanson}" />

        <div class="form-group">
          <label>Titre :</label>
          <!-- ✅ FIX: name="title" matches entity field, th:value uses chanson.title -->
          <input type="text" name="title" class="form-control" th:value="${chanson.title}" />
        </div>

        <div class="form-group">
          <label>Artiste :</label>
          <!-- ✅ FIX: name="artist" matches entity field -->
          <input type="text" name="artist" class="form-control" th:value="${chanson.artist}" />
        </div>

        <div class="form-group">
          <label>Date de création :</label>
          <!-- ✅ FIX: name="dateCreation" must match @RequestParam in controller -->
          <input type="date" name="dateCreation" class="form-control" th:value="${chanson.releaseDate}" />
        </div>

        <div class="form-group">
          <label>Album :</label>
          <!-- ✅ FIX: simplified album select — handles both null and non-null album -->
          <select name="album.idalb" class="form-control">
            <option value="">-- Aucun album --</option>
            <option th:each="a : ${albums}"
                    th:value="${a.idalb}"
                    th:text="${a.nomAlb}"
                    th:selected="${chanson.album != null and a.idalb == chanson.album.idalb}">
            </option>
          </select>
        </div>

        <!-- Show success message if set -->
        <div th:if="${msg != null}" class="alert alert-success" th:text="${msg}"></div>

        <button type="submit" class="btn btn-primary">Valider</button>
      </form>
    </div>
  </div>
</div>

<script src="/chansons/webjars/jquery/3.5.1/jquery.min.js"></script>
<script src="/chansons/webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
