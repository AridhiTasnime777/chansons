<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>Formulaire Chanson</title>
<link rel="stylesheet" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>
</head>
<body>
<div th:replace="~{template :: navbar}"></div>

<div class="container mt-5">
  <div class="card">
    <div class="card-header" th:if="${mode=='new'}">Ajout des Chansons</div>
    <div class="card-header" th:if="${mode=='edit'}">Modification des Chansons</div>
    <div class="card-body">

      <form th:action="@{/saveChanson}" method="post">

        <input type="hidden" name="page" th:value="${page}" />
        <input type="hidden" name="size" th:value="${size}" />
        <input type="hidden" name="idChanson" th:value="${chanson.idChanson}" />

        <div class="form-group">
          <label>Titre :</label>
          <input type="text" name="title" class="form-control" th:value="${chanson.title}" />
          <span th:if="${#fields.hasErrors('chanson.title')}" th:errors="${chanson.title}" class="text-danger"></span>
        </div>

        <div class="form-group">
          <label>Artiste :</label>
          <input type="text" name="artist" class="form-control" th:value="${chanson.artist}" />
          <span th:if="${#fields.hasErrors('chanson.artist')}" th:errors="${chanson.artist}" class="text-danger"></span>
        </div>

        <div class="form-group">
          <label>Date de réalisation :</label>
          <input type="date" name="releaseDate" class="form-control" th:value="${chanson.releaseDate}" />
          <span th:if="${#fields.hasErrors('chanson.releaseDate')}" th:errors="${chanson.releaseDate}" class="text-danger"></span>
        </div>

        <div class="form-group">
          <label>Album :</label>
          <select name="album.idalb" class="form-control" th:if="${chanson.album != null}">
            <option value="">-- Aucun album --</option>
            <option th:each="a : ${albums}"
                    th:value="${a.idalb}"
                    th:text="${a.nomAlb}"
                    th:selected="${a.idalb == chanson.album.idalb}">
            </option>
          </select>
          <select name="album.idalb" class="form-control" th:if="${chanson.album == null}">
            <option value="">-- Aucun album --</option>
            <option th:each="a : ${albums}"
                    th:value="${a.idalb}"
                    th:text="${a.nomAlb}">
            </option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Valider</button>
        <a th:href="@{/ListeChansons}" class="btn btn-secondary ml-2">Annuler</a>

      </form>
    </div>
  </div>
</div>

<script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</body>
</html>
