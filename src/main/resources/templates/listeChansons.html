<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css"
href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Liste des Produits</title>
</head>
<body>
<div class="container mt-5">
<div class="card">
 <div class="card-header">
 Liste des chansons
 </div>
 <div class="card-body">

 <table class="table table-striped">
 <tr>
 <th>ID</th><th>Nom Chanson</th><th>Prix</th>
 </tr>
 <tr th:each="p:${chansons}">
 <td th:text="${p.id}"></td>
 <td th:text="${p.titre}"></td>
 <td th:text="${p.artist}"></td>
 <td th:if= "${!#strings.isEmpty(p.album)}" th:text="${p.album.nomAlb}"></td>
 			   <td th:if= "${#strings.isEmpty(p.album)}" th:text="${'Pas d\'Album'}"></td> 
              
               
             
              <td><a class="btn btn-success" th:href="@{modifierChanson(id=${p.id}, page=${currentPage},size=${size})}">Editer</a></td>
              <td><a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"
                th:href="@{supprimerChanson(id=${p.id}, page=${currentPage},size=${size})}">Supprimer</a></td> 
           </tr>             
      </table>
   <ul class="nav nav-pills">
         <li th:each="page,status:${pages}">
           <a th:class="${status.index==currentPage?'btn btn-primary':'btn'  }" 
       th:href="@{ ListeChansons(page=${status.index}, size=${size} ) }"
              th:text="${status.index }"></a>
         </li>
      </ul>
      </div>
</div>
</div>
</body>
</html>
