<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>Liste des Chansons</title>
<link rel="stylesheet" type="text/css" href="/chansons/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
</head>
<body>
<div th:replace="~{template :: navbar}"></div>

<div class="container mt-5">
  <div class="card">
    <div class="card-header">Liste des chansons</div>
    <div class="card-body">
      <a class="btn btn-primary mb-3" th:href="@{/showCreate}">+ Ajouter</a>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Titre</th>       <!-- ✅ FIX: was "Nom Chanson" but column uses p.title -->
            <th>Artiste</th>
            <th>Album</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${chansons}">
            <td th:text="${p.idChanson}"></td>          <!-- ✅ FIX: was p.id → p.idChanson -->
            <td th:text="${p.title}"></td>              <!-- ✅ FIX: was p.titre → p.title -->
            <td th:text="${p.artist}"></td>
            <td th:if="${p.album != null}" th:text="${p.album.nomAlb}"></td>
            <td th:if="${p.album == null}">Pas d'Album</td>  <!-- ✅ FIX: simpler null check -->
            <td>
              <a class="btn btn-success btn-sm"
                 th:href="@{/modifierChanson(id=${p.idChanson})}">Éditer</a>  <!-- ✅ FIX: idChanson -->
            </td>
            <td>
              <a class="btn btn-danger btn-sm"
                 onclick="return confirm('Êtes-vous sûr ?')"
                 th:href="@{/supprimerChanson(id=${p.idChanson})}">Supprimer</a>  <!-- ✅ FIX: idChanson -->
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/chansons/webjars/jquery/3.5.1/jquery.min.js"></script>
<script src="/chansons/webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
